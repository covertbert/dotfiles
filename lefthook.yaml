# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    shell-fmt:
      glob: "{.gitconfig,.gitignore,.zshrc,*.sh,*.toml,*.zsh,*.gitconfig}"
      run: shfmt -w {staged_files}
      stage_fixed: true
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {staged_files}
    bash-syntax:
      glob: "**/*.sh"
      run: bash -c 'for file do bash -n "$file"; done' -- {staged_files}
    node-syntax:
      glob: "services/pi-meridian/*.mjs"
      run: bash -c 'for file do node --check "$file"; done' -- {staged_files}
    pi-meridian-tests:
      glob: "services/pi-meridian/*.mjs"
      run: node --test services/pi-meridian/pi-meridian-proxy.test.mjs
    plist:
      glob: "**/*.plist"
      run: bash -c 'for file do plutil -lint "$file"; done' -- {staged_files}

pre-push:
  parallel: true
  commands:
    prettier:
      glob: "*"
      run: npx prettier --check {push_files}
    shell-fmt:
      glob: "{.gitconfig,.gitignore,.zshrc,*.sh,*.toml,*.zsh,*.gitconfig}"
      run: shfmt -l {push_files}
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {push_files}
    bash-syntax:
      glob: "**/*.sh"
      run: bash -c 'for file do bash -n "$file"; done' -- {push_files}
    node-syntax:
      glob: "services/pi-meridian/*.mjs"
      run: bash -c 'for file do node --check "$file"; done' -- {push_files}
    pi-meridian-tests:
      glob: "services/pi-meridian/*.mjs"
      run: node --test services/pi-meridian/pi-meridian-proxy.test.mjs
    plist:
      glob: "**/*.plist"
      run: bash -c 'for file do plutil -lint "$file"; done' -- {push_files}
