# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    shell-fmt:
      glob: "{.gitconfig,.gitignore,.zshrc,*.sh,*.toml,*.zsh,*.gitconfig}"
      run: shfmt -w {staged_files}
      stage_fixed: true
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {staged_files}
    bash-syntax:
      glob: "**/*.sh"
      run: bash -c 'for file do bash -n "$file"; done' -- {staged_files}

pre-push:
  parallel: true
  commands:
    prettier:
      glob: "*"
      run: npx prettier --check {push_files}
    shell-fmt:
      glob: "{.gitconfig,.gitignore,.zshrc,*.sh,*.toml,*.zsh,*.gitconfig}"
      run: shfmt -l {push_files}
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {push_files}
    bash-syntax:
      glob: "**/*.sh"
      run: bash -c 'for file do bash -n "$file"; done' -- {push_files}
